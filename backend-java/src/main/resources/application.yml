server:
  port: 8080

spring:
  application:
    name: smart-wardrobe
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据库
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/electronic_wardrobe?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # RabbitMQ (可选)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1

  # 文件上传
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # Flyway 数据库迁移
  flyway:
    enabled: false  # 首次部署时改为 true，使用 V2 迁移脚本
    locations: classpath:db/migration
    baseline-on-migrate: true

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: electronic-wardrobe-jwt-secret-2026-min-len-32!!
  expiration: 604800       # 7天
  refresh-expiration: 2592000  # 30天

# 微信小程序
wechat:
  miniapp:
    app-id: ${WECHAT_APP_ID:wx13f5887a942ac750}
    app-secret: ${WECHAT_APP_SECRET:}

# 腾讯云 COS
cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ap-guangzhou
  bucket-name: smart-wardrobe-${spring.profiles.active}
  cdn-domain: ${CDN_DOMAIN:}

# 百度 AI
baidu:
  ai:
    app-id: ${BAIDU_AI_APP_ID:}
    api-key: ${BAIDU_AI_API_KEY:}
    secret-key: ${BAIDU_AI_SECRET_KEY:}

# Spring AI (LLM，后续启用)
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_MODEL:gpt-4o-mini}
          temperature: 0.7
          max-tokens: 500

# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# 日志
logging:
  level:
    com.wardrobe: DEBUG
    org.springframework: INFO
